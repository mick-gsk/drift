# Label definitions for the drift repository.
# These labels are maintained manually. If you add a label here,
# create it on GitHub as well: Settings → Labels.

- name: good first issue
  color: "0e8a16"
  description: Good entry point for new contributors

- name: help wanted
  color: "0e8a16"
  description: Extra attention is needed

- name: claimed
  color: "0E8A16"
  description: Issue is reserved for one confirmed contributor

- name: needs reproduction
  color: "fbca04"
  description: A minimal reproducing case is needed before work can start

- name: false-positive
  color: "d93f0b"
  description: Drift flags something that is not a real issue

- name: false-negative
  color: "d93f0b"
  description: Drift misses something that is a real issue

- name: signal-quality
  color: "0075ca"
  description: Improves precision, recall, or explainability of a signal

- name: docs
  color: "c5def5"
  description: Documentation improvements

- name: tests
  color: "bfd4f2"
  description: Test coverage or fixture improvements

- name: bug
  color: "d73a4a"
  description: Something is not working as expected

- name: enhancement
  color: "a2eeef"
  description: New feature or improvement

- name: copilot-agent
  color: "0052CC"
  description: Issue is prepared for GitHub Copilot coding agent assignment

- name: needs-agent-brief
  color: "B60205"
  description: Copilot-agent issue is missing required task brief sections

- name: not-prioritized
  color: "e4e4e4"
  description: Acknowledged but not currently prioritized

- name: stale
  color: "ededed"
  description: Inactive for 90+ days — will auto-close if no further activity

- name: release:feature
  color: "1d76db"
  description: Include this PR under Features in release notes

- name: release:fix
  color: "d73a4a"
  description: Include this PR under Fixes in release notes

- name: release:maintenance
  color: "6f42c1"
  description: Include this PR under Maintenance in release notes

- name: release:docs
  color: "0e8a16"
  description: Include this PR under Documentation in release notes

- name: release:skip
  color: "cfd3d7"
  description: Exclude this PR from release notes

# ---------------------------------------------------------------------------
# PR Size Labels
# ---------------------------------------------------------------------------

- name: size/XS
  color: "3cbf00"
  description: "Diff < 10 lines (excl. fixtures/lockfiles)"

- name: size/S
  color: "5d9e28"
  description: "Diff 10–49 lines (excl. fixtures/lockfiles)"

- name: size/M
  color: "f0c000"
  description: "Diff 50–149 lines (excl. fixtures/lockfiles)"

- name: size/L
  color: "e87c00"
  description: "Diff 150–499 lines (excl. fixtures/lockfiles)"

- name: size/XL
  color: "d93f0b"
  description: "Diff ≥ 500 lines — consider splitting"

# ---------------------------------------------------------------------------
# PR Lane Labels
# ---------------------------------------------------------------------------

- name: lane/fast-lane
  color: "0e8a16"
  description: "Docs/chore/fixture — reduced check path, eligible for automerge"

- name: lane/standard
  color: "fbca04"
  description: "Fixes and features — standard review path"

- name: lane/high-risk
  color: "b60205"
  description: "Signals/scoring/architecture — full gates + audit required"

# ---------------------------------------------------------------------------
# Triage Labels
# ---------------------------------------------------------------------------

- name: needs-description
  color: "e4e4e4"
  description: "PR body is empty or uses placeholder template"

- name: needs-buglink
  color: "e4e4e4"
  description: "Test-only PR without a linked issue or fix reference"

- name: auto-triaged
  color: "c5def5"
  description: "PR was automatically triaged for triage labels"
