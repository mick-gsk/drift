name: PR Auto Agent Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: "pr-auto-agent-review-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  request-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Request Copilot review on eligible PRs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull request payload found; skipping.");
              return;
            }

            if (pr.draft) {
              core.info("Draft PR; skipping auto review request.");
              return;
            }

            const externalAssoc = new Set([
              "CONTRIBUTOR",
              "FIRST_TIME_CONTRIBUTOR",
              "FIRST_TIMER",
              "NONE",
            ]);
            const isExternalHumanContributor =
              pr.head?.repo?.fork === true &&
              (pr.user?.type || "User") !== "Bot" &&
              externalAssoc.has(pr.author_association || "NONE");

            if (isExternalHumanContributor) {
              core.info("External human contributor PR detected; skipping agent auto review.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const markerLabel = "agent-review-requested";

            const requestedReviewers = (pr.requested_reviewers || [])
              .map((reviewer) => (reviewer.login || "").toLowerCase())
              .filter(Boolean);
            if (requestedReviewers.includes("copilot")) {
              core.info("Copilot review is already requested.");
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ["copilot"],
              });
              core.info("Requested Copilot as reviewer.");
            } catch (error) {
              core.warning(`Could not request Copilot reviewer automatically: ${error.message}`);
              return;
            }

            try {
              await github.rest.issues.getLabel({ owner, repo, name: markerLabel });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: markerLabel,
                color: "1D76DB",
                description: "Agent review was requested automatically",
              });
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: [markerLabel],
            });

            core.info("Silent auto review flow completed.");
