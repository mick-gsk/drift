name: Workflow Sanity

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "action.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "action.yml"
  workflow_dispatch:

concurrency:
  group: "sanity-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sanity:
    name: Workflow file hygiene
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Resolve Python executable
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this runner."
            exit 1
          }

      - name: No tabs in workflow files
        shell: powershell
        run: |
          & $env:PYTHON_BIN -c "
          import pathlib, sys
          bad = []
          for p in sorted(pathlib.Path('.github/workflows').rglob('*.yml')):
              if b'\t' in p.read_bytes():
                  bad.append(str(p))
          if bad:
              print('Tabs found in workflow file(s):')
              for p in bad: print(f'  - {p}')
              sys.exit(1)
          print('No tabs in workflow files.')
          "

      - name: No merge conflict markers
        shell: powershell
        run: |
          & $env:PYTHON_BIN -c "
          import pathlib, re, sys
          marker = re.compile(rb'^[<>=]{7}( |\$)', re.MULTILINE)
          bad = []
          for p in sorted(pathlib.Path('.github').rglob('*')):
              if p.is_file() and p.suffix in ('.yml', '.yaml', '.md'):
                  if marker.search(p.read_bytes()):
                      bad.append(str(p))
          if bad:
              print('Merge conflict markers found:')
              for p in bad: print(f'  - {p}')
              sys.exit(1)
          print('No conflict markers.')
          "

      - name: Install actionlint v1.7.11 (checksummed)
        # Download a pinned binary and verify its SHA-256 digest before running.
        # This is the checksummed-binary pattern — no curl | bash, no floating
        # action tag. The digest matches the GitHub API asset digest for
        # actionlint_1.7.11_windows_amd64.zip.
        shell: powershell
        run: |
          $ver    = "1.7.11"
          $sha256 = "5414b7124a91f4b5abee62e5c9d84802237734f8d15b9b7032732a32c3ebffa3"
          $url    = "https://github.com/rhysd/actionlint/releases/download/v${ver}/actionlint_${ver}_windows_amd64.zip"
          $zip    = "$env:RUNNER_TEMP\actionlint.zip"
          Invoke-RestMethod -Uri $url -OutFile $zip
          $actual = (Get-FileHash -Algorithm SHA256 -Path $zip).Hash.ToLower()
          if ($actual -ne $sha256) {
            Write-Error "actionlint SHA256 mismatch:`n  expected: $sha256`n  actual:   $actual"
            exit 1
          }
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\actionlint"
          "$env:RUNNER_TEMP\actionlint" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "actionlint v${ver} installed (SHA-256 verified)"

      - name: Lint workflow files (actionlint)
        # Fast targeted check on workflow files — runs before the heavier
        # security-hygiene job completes. Actionlint already runs there via
        # pre-commit, but only on full CI; this catches errors earlier for
        # workflow-only PRs.
        shell: powershell
        run: actionlint -color
