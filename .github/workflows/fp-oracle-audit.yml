name: FP Oracle Audit

on:
  schedule:
    # Weekly: Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repo names (empty = all from manifest)'
        required: false
        default: ''
      save_history:
        description: 'Append results to trend log'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  fp-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install drift
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Oracle FP Audit
        run: |
          ARGS=""
          if [ -n "${{ inputs.repos }}" ]; then
            IFS=',' read -ra REPOS <<< "${{ inputs.repos }}"
            ARGS="--repo ${REPOS[*]}"
          fi
          if [ "${{ inputs.save_history }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --save-history"
          fi
          python scripts/oracle_fp_audit.py $ARGS

      - name: Upload FP Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: fp-oracle-report
          path: |
            benchmark_results/oracle_fp_report.json
            benchmark_results/oracle_fp_history.json
          retention-days: 90

      - name: Alert on high FP rate
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ci_fp_threshold_alert.py
