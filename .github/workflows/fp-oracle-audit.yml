name: FP Oracle Audit

on:
  schedule:
    # Weekly: Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repo names (empty = all from manifest)'
        required: false
        default: ''
      save_history:
        description: 'Append results to trend log'
        required: false
        type: boolean
        default: true
      use_dev_version:
        description: 'Install dev version from workspace instead of published PyPI package'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  fp-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install drift
        shell: bash
        run: |
          pip install --upgrade pip
          if [ "${{ inputs.use_dev_version || 'false' }}" = "true" ]; then
            pip install -e ".[dev]"
          else
            pip install drift-analyzer
          fi

      - name: Run Oracle FP Audit
        run: |
          ARGS=""
          if [ -n "${{ inputs.repos }}" ]; then
            IFS=',' read -ra REPOS <<< "${{ inputs.repos }}"
            ARGS="--repo ${REPOS[*]}"
          fi
          if [ "${{ inputs.save_history }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --save-history"
          fi
          python scripts/oracle_fp_audit.py $ARGS

      - name: Upload FP Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: fp-oracle-report
          path: |
            benchmark_results/oracle_fp_report.json
            benchmark_results/oracle_fp_history.json
          retention-days: 90

      - name: Alert on high FP rate
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ci_fp_threshold_alert.py

      - name: Commit oracle report to repo
        if: ${{ inputs.save_history == true || inputs.save_history == 'true' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmark_results/oracle_fp_report.json benchmark_results/oracle_fp_history.json 2>/dev/null || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore(oracle): update fp oracle report [skip ci]"
          git push
