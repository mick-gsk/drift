name: Dependabot Auto-Merge Loop

# Enable auto-merge for Dependabot minor/patch PRs. The merge only completes
# once branch protection is satisfied (required CI + required human review) —
# the workflow does NOT approve on the bot's behalf. Configure a required
# review on the default branch for this gate to be effective.
# Major updates are flagged for human review via issue label only.
#
# Labels set by dependabot.yml:
#   minor/patch (pip):          "enhancement"
#   major (pip):                "dependencies", "major-update", "staged-rollout"
#   minor/patch (actions):      "enhancement"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act on Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor or patch updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: |
          echo "Minor/patch update detected — enabling auto-merge."
          # --auto only completes once branch-protection requirements (incl. a
          # required human review) are satisfied. We intentionally do NOT
          # self-approve here: a bot approving its own dependency PR would
          # defeat the required-review policy and merge unreviewed upstream
          # changes (and transitive uv.lock churn) — a supply-chain risk.
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            --squash \
            --delete-branch

      - name: Flag major updates for human review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          PR_URL="${{ github.event.pull_request.html_url }}"
          PACKAGE="${{ steps.meta.outputs.dependency-names }}"
          FROM="${{ steps.meta.outputs.previous-version }}"
          TO="${{ steps.meta.outputs.new-version }}"

          BODY="## Major Dependency Update Requires Review

          | Field | Value |
          |---|---|
          | Package | \`$PACKAGE\` |
          | From | \`$FROM\` |
          | To | \`$TO\` |
          | PR | $PR_URL |

          **Action required:** Review breaking changes before merging.
          Check the package changelog and run the full test suite locally.

          _Flagged by \`dependabot-auto-merge-loop.yml\`._"

          # Check if an open issue already exists for this package
          EXISTING=$(gh issue list \
            --label "major-update" \
            --state open \
            --search "$PACKAGE major update" \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "Major dependency update: $PACKAGE $FROM -> $TO" \
              --label "dependencies,major-update,staged-rollout" \
              --body "$BODY"
          else
            echo "Issue #$EXISTING already open for $PACKAGE — skipping duplicate."
          fi
