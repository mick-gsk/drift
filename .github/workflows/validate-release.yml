name: Validate Release Tag

# Triggered on every tag push matching v*.
# Acts as the first gate in the release pipeline:
#   - Rejects tags that are not full SemVer (vMAJOR.MINOR.PATCH)
#   - Rejects major-only tags pushed by humans (v1, v2 → automation only)
#   - Rejects mismatches between the tag and pyproject.toml version
#   - Creates a published GitHub release from the validated tag
#     to trigger publish.yml automatically
#
# For extra safety, publish.yml runs the same check as its first job.

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate tag & pyproject.toml consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Block major-only tags and validate SemVer format
        # Rejects v1, v2, etc. – those must only come from automation.
        # Accepts v1.2.3 style and validates pyproject.toml matches.
        run: python scripts/check_version.py --tag "${{ github.ref_name }}"

  create-release:
    name: Create GitHub release from validated tag
    needs: validate-tag
    runs-on: ubuntu-latest

    steps:
      - name: Create published release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists – skipping creation"
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
          echo "Created published release for $TAG"
