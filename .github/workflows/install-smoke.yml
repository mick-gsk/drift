name: Install Smoke Test

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to test (e.g. 1.2.0). Leave empty for latest."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: "smoke-${{ github.event.release.tag_name || github.run_id }}"
  cancel-in-progress: true

jobs:
  smoke:
    name: Install from PyPI and verify CLI (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install drift-analyzer from PyPI (with retry)
        shell: bash
        run: |
          VERSION="${{ inputs.version || '' }}"
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if [ -n "$VERSION" ]; then
              pip install "drift-analyzer==$VERSION" && break
            else
              pip install drift-analyzer && break
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              WAIT=$((i * 30))
              echo "::warning::pip install failed (attempt $i/$MAX_RETRIES), retrying in ${WAIT}s..."
              sleep $WAIT
            else
              echo "::error::pip install failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

      - name: Verify CLI entry point
        run: drift --version

      - name: Verify drift --help
        run: drift --help

      - name: Verify drift analyze (dry run on empty dir)
        shell: bash
        run: |
          mkdir -p /tmp/test-repo && cd /tmp/test-repo && git init
          drift analyze . --format json 2>&1 || true

      - name: Verify importability
        run: python -c "import drift; print(drift.__version__)"
