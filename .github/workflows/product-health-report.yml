name: Product Health Report

on:
  schedule:
    - cron: "0 7 * * 1"   # Every Monday at 07:00 UTC
  workflow_dispatch:
    inputs:
      include_perf_run:
        description: "Include perf wall-clock run (~8s extra)"
        required: false
        default: false
        type: boolean

concurrency:
  group: "product-health-report"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  report:
    name: Collect and report product health
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: ./.github/actions/python-setup
        with:
          python-version: "3.12"

      - name: Collect KPI snapshot with product health
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERF_FLAG=""
          if [ "${{ github.event.inputs.include_perf_run }}" = "true" ]; then
            PERF_FLAG="--include-perf-run"
          fi
          python scripts/collect_kpi_snapshot.py \
            --product-health \
            --no-trend \
            $PERF_FLAG

      - name: Build weekly report
        run: |
          python scripts/kpi_weekly_report.py \
            --apply

      - name: Write step summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          snap_path = Path("benchmark_results/kpi_snapshot.json")
          report_path = Path("benchmark_results/kpi_weekly_report.json")

          if not snap_path.exists():
              raise SystemExit("kpi_snapshot.json missing")

          snap = json.loads(snap_path.read_text(encoding="utf-8"))
          ph = snap.get("product_health", {})
          adoption = ph.get("adoption", {})
          stability = ph.get("stability", {})
          performance = ph.get("performance", {})

          report = {}
          if report_path.exists():
              report = json.loads(report_path.read_text(encoding="utf-8"))

          overall_status = report.get("status", "UNKNOWN")
          ph_status = ph.get("status", "NO_DATA") if report_path.exists() else (
              report.get("product_health", {}).get("status", "NO_DATA")
          )

          # Re-read from report if available (more complete)
          if report_path.exists():
              ph_status = report.get("product_health", {}).get("status", "NO_DATA")

          status_emoji = {"HEALTHY": "green", "WARNING": "yellow", "ALARM": "red", "NO_DATA": "gray"}.get(
              overall_status, "gray"
          )
          ph_emoji = {"HEALTHY": "green", "WARNING": "yellow", "ALARM": "red", "NO_DATA": "gray"}.get(
              ph_status, "gray"
          )

          lines = [
              "## Product Health Report",
              "",
              f"| Dimension | Status |",
              f"|-----------|--------|",
              f"| Overall KPI | ![{overall_status}](https://img.shields.io/badge/{overall_status}-{status_emoji}) |",
              f"| Product Health | ![{ph_status}](https://img.shields.io/badge/{ph_status}-{ph_emoji}) |",
              "",
              "### Adoption",
              "",
              f"| Metric | Value |",
              f"|--------|-------|",
          ]

          pypi_last = adoption.get("pypi_downloads_last_30d")
          pypi_prev = adoption.get("pypi_downloads_prev_30d")
          mom = adoption.get("pypi_downloads_mom_delta")
          stars = adoption.get("github_stars")
          forks = adoption.get("github_forks")

          lines.append(f"| PyPI downloads (last 30d) | {pypi_last if pypi_last is not None else 'n/a'} |")
          lines.append(f"| PyPI downloads (prev 30d) | {pypi_prev if pypi_prev is not None else 'n/a'} |")
          if mom is not None:
              arrow = "+" if mom >= 0 else ""
              lines.append(f"| MoM delta | {arrow}{mom * 100:.1f}% |")
          else:
              lines.append("| MoM delta | n/a |")
          lines.append(f"| GitHub stars | {stars if stars is not None else 'n/a'} |")
          lines.append(f"| GitHub forks | {forks if forks is not None else 'n/a'} |")

          lines += [
              "",
              "### Stability",
              "",
              f"| Metric | Value |",
              f"|--------|-------|",
              f"| Open issues | {stability.get('open_issues', 'n/a')} |",
              f"| Open bugs | {stability.get('open_bugs', 'n/a')} |",
          ]

          perf_wc = performance.get("wall_clock_median_seconds")
          budget = performance.get("budget_seconds")
          headroom = performance.get("budget_headroom_pct")

          if perf_wc is not None:
              lines += [
                  "",
                  "### Performance",
                  "",
                  f"| Metric | Value |",
                  f"|--------|-------|",
                  f"| Wall-clock median | {perf_wc:.2f}s |",
                  f"| Budget | {budget}s |",
                  f"| Headroom | {headroom * 100:.1f}% |" if headroom is not None else "| Headroom | n/a |",
              ]

          # Append precision/recall from report
          pr = report.get("precision_recall", {})
          if pr:
              lines += [
                  "",
                  "### Quality",
                  "",
                  f"| Metric | Value |",
                  f"|--------|-------|",
                  f"| Aggregate F1 | {pr.get('aggregate_f1', 'n/a')} |",
                  f"| Mutation recall | {pr.get('mutation_recall', 'n/a')} |",
                  f"| Fixtures | {pr.get('total_fixtures', 'n/a')} |",
              ]

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload snapshot as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: product-health-${{ github.run_id }}
          path: |
            benchmark_results/kpi_snapshot.json
            benchmark_results/kpi_weekly_report.json
          retention-days: 90
