name: Drift Feedback Summary

# Weekly digest of calibration state and signal-feedback trends.
# Summarises the current calibration output and posts it as a workflow
# summary — no issue is created unless a hard divergence is detected.

on:
  schedule:
    # Weekly Monday 06:00 UTC (after trend-alert at 05:00)
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "drift-feedback-summary"
  cancel-in-progress: true

jobs:
  summary:
    name: Calibration and feedback digest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install drift
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run calibration dry-run
        run: |
          python scripts/ops_calibration_cycle.py --skip-analyze 2>&1 | tee calibration_summary.txt

      - name: Post calibration summary to workflow
        run: |
          {
            echo "## Calibration Summary"
            echo '```'
            cat calibration_summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload calibration summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: calibration-feedback-summary
          path: calibration_summary.txt
          retention-days: 30
