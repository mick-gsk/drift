name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_nightly_smoke:
        description: "Run full nightly smoke profile"
        required: false
        default: false
        type: boolean

concurrency:
  group: "ci-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # required for Codecov OIDC tokenless upload

jobs:
  determine_changes:
    name: Determine changed paths
    runs-on: ubuntu-latest
    outputs:
      signals: ${{ steps.filter.outputs.signals }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3.0.2
        id: filter
        with:
          filters: |
            signals:
              - 'src/drift/signals/**'
              - 'src/drift/scoring/**'
              - 'src/drift/ingestion/**'
              - 'packages/**'
              - 'tests/**'
            docs:
              - 'docs/**'
              - 'docs-site/**'
              - '*.md'

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
        with:
          extra_args: "--all-files --hook-stage manual"
        env:
          DRIFT_SKIP_NUDGE_GATE: "1"

  version-check:
    name: Version format check
    # NOTE: Uses GitHub-hosted Windows runner.
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve Python executable
        # [win-only] PowerShell-based resolver for GitHub-hosted Windows runner.
        shell: powershell
        run: |
          $resolved = $false
          if (Get-Command python -ErrorAction SilentlyContinue) {
            python --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=python" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved -and (Get-Command py -ErrorAction SilentlyContinue)) {
            py --version
            if ($LASTEXITCODE -eq 0) {
              "PYTHON_BIN=py" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $resolved = $true
            }
          }
          if (-not $resolved) {
            Write-Error "Neither 'python' nor 'py' is available on this runner."
            exit 1
          }

      - name: Validate pyproject.toml version is SemVer
        # [win-only] PowerShell invocation on Windows runner.
        shell: powershell
        run: |
          & $env:PYTHON_BIN scripts/check_version.py --check-semver

      - name: Enforce release discipline
        if: github.ref == 'refs/heads/main'
        # [win-only] PowerShell invocation on Windows runner.
        # Tag-lineage failures degrade to warnings in CI — the release
        # workflow owns tag repair; CI should not block unrelated work.
        shell: powershell
        env:
          DRIFT_TAG_LINEAGE_WARN: "1"
        run: |
          & $env:PYTHON_BIN scripts/check_release_discipline.py

      - name: Check model consistency
        # [win-only] PowerShell invocation on Windows runner.
        # Requires workspace packages (drift_engine) to be importable.
        shell: powershell
        run: |
          & $env:PYTHON_BIN -m pip install --quiet `
            -e packages/drift-config `
            -e packages/drift-engine `
            -e packages/drift-sdk `
            -e packages/drift-output `
            -e packages/drift-session `
            -e packages/drift-mcp `
            -e packages/drift-verify `
            -e packages/drift-cli
          & $env:PYTHON_BIN scripts/check_model_consistency.py

  test:
    # NOTE: Runs on Ubuntu and Windows for cross-platform coverage.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    needs: version-check
    env:
      AGENT_TOOLSDIRECTORY: ${{ github.workspace }}\.python-toolcache
      RUNNER_TOOL_CACHE: ${{ github.workspace }}\.python-toolcache
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [windows-latest, ubuntu-latest]
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Prepare isolated Python tool cache
        # [win-only] Windows path + PowerShell setup for local toolcache.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:AGENT_TOOLSDIRECTORY | Out-Null
          New-Item -ItemType Directory -Force -Path $env:PIP_CACHE_DIR | Out-Null
          Write-Host "Using isolated tool cache: $env:AGENT_TOOLSDIRECTORY"
          Write-Host "Using pip cache directory: $env:PIP_CACHE_DIR"

      - name: Setup Python (primary path)
        id: setup_python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        continue-on-error: true
        with:
          python-version: ${{ matrix.python-version }}
          # Keep setup-python focused on interpreter provisioning.
          # pip caching is handled explicitly via actions/cache for better control in CI.

      - name: Restore pip cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-

      - name: Restore static analysis caches
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            .mypy_cache
            .ruff_cache
          key: static-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            static-${{ runner.os }}-${{ matrix.python-version }}-
            static-${{ runner.os }}-

      - name: Resolve Python executable with fallback
        # [win-only] PowerShell fallback path for when setup-python cannot provision requested version.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $requested = "${{ matrix.python-version }}"
          $source = ""

          if ("${{ steps.setup_python.outcome }}" -eq "success") {
            python --version
            if ($LASTEXITCODE -eq 0) {
              $source = "toolcache"
            }
          }

          if (-not $source) {
            if (Get-Command py -ErrorAction SilentlyContinue) {
              py -$requested --version
              if ($LASTEXITCODE -eq 0) {
                $source = "py-launcher"
              }
            }
          }

          if (-not $source) {
            Write-Error "No usable Python interpreter found for $requested. setup-python failed and local py launcher is unavailable or missing this version."
            exit 1
          }

          if (Test-Path ".venv-ci") {
            Remove-Item ".venv-ci" -Recurse -Force
          }

          if ($source -eq "toolcache") {
            python -m venv .venv-ci
          } else {
            py -$requested -m venv .venv-ci
          }

          $venvPython = Join-Path $PWD ".venv-ci\Scripts\python.exe"
          if (-not (Test-Path $venvPython)) {
            Write-Error "Expected interpreter not found: $venvPython"
            exit 1
          }

          & $venvPython --version
          "PYTHON_BIN=$venvPython" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output ("Resolved Python via {0}: {1}" -f $source, $venvPython)

      - name: Set Python executable (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python3 -m venv .venv-ci
          echo "PYTHON_BIN=$(pwd)/.venv-ci/bin/python3" >> "$GITHUB_ENV"

      - name: Install dependencies
        # Retry up to 3 times to handle transient PyPI/network failures.
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m pip config set global.cache-dir $env:PIP_CACHE_DIR
          & $env:PYTHON_BIN -m pip install --upgrade pip
          # Install workspace packages FIRST so pip resolves them locally.
          & $env:PYTHON_BIN -m pip install `
            -e packages/drift-config `
            -e packages/drift-engine `
            -e packages/drift-sdk `
            -e packages/drift-output `
            -e packages/drift-session `
            -e packages/drift-mcp `
            -e packages/drift-verify `
            -e packages/drift-cli
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            & $env:PYTHON_BIN -m pip install -e ".[dev,mcp]"
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -lt $maxRetries) {
              Write-Warning "pip install failed (attempt $i/$maxRetries), retrying in $($i * 15)s..."
              Start-Sleep -Seconds ($i * 15)
            } else {
              Write-Error "pip install failed after $maxRetries attempts"
              exit 1
            }
          }
          & $env:PYTHON_BIN -m pip install pip-audit

      - name: Dependency vulnerability audit
        # Fails on any known vulnerability with a fix available.
        # We audit a fully pinned package list without editable lines and
        # disable resolver mode to avoid false failures from dependency re-resolution.
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m pip freeze | Where-Object { $_ -notmatch "^-e\s" } | Set-Content pip-audit-requirements.txt -Encoding utf8
          & $env:PYTHON_BIN -m pip_audit --strict --desc --no-deps --disable-pip -r pip-audit-requirements.txt

      - name: Lint with ruff
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m ruff check src/ tests/

      - name: Type-check with mypy
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m mypy src/drift

      - name: Dead code detection with vulture
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m vulture src/drift --min-confidence 65 --ignore-names cls

      - name: Run tests with coverage (reference Python, Linux)
        if: matrix.python-version == '3.12' && runner.os == 'Linux'
        run: |
          $PYTHON_BIN -m pytest -v --tb=short --cov=drift --cov-report=term-missing --cov-report=xml:coverage.xml -m "not slow"
          $PYTHON_BIN -m coverage report --fail-under=73

      - name: Run tests (no coverage)
        if: matrix.python-version != '3.12' || runner.os != 'Linux'
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m pytest -v --tb=short -m "not slow"

      - name: Ensure deterministic coverage.xml
        if: matrix.python-version == '3.12' && runner.os == 'Linux' && always()
        run: |
          if [ ! -f coverage.xml ] && [ -f .coverage ]; then
            echo "coverage.xml missing after pytest; generating from .coverage"
            $PYTHON_BIN -m coverage xml -o coverage.xml
          fi

          if [ ! -f coverage.xml ]; then
            echo "coverage.xml missing; refusing ambiguous Codecov upload"
            exit 1
          fi

          echo "coverage.xml ready ($(wc -c < coverage.xml) bytes)"

      - name: Validate coverage.xml structure
        if: matrix.python-version == '3.12' && runner.os == 'Linux' && always()
        run: |
          if [ ! -f coverage.xml ]; then
            echo "ERROR: coverage.xml not found"
            exit 1
          fi
          if ! grep -q 'lines-covered=' coverage.xml; then
            echo "ERROR: coverage.xml has invalid structure"
            exit 1
          fi
          LINES_COVERED=$(grep -oP 'lines-covered="\K[0-9]+' coverage.xml | head -1)
          LINE_RATE=$(grep -oP 'line-rate="\K[0-9.]+' coverage.xml | head -1)
          echo "✓ Coverage data present: lines-covered=$LINES_COVERED, line-rate=$LINE_RATE"

      - name: Pre-Codecov diagnostics
        if: matrix.python-version == '3.12' && runner.os == 'Linux' && always()
        run: |
          echo "=== Codecov Upload Diagnostics ==="
          echo "CODECOV_TOKEN set: $([ -n '${{ secrets.CODECOV_TOKEN }}' ] && echo 'YES' || echo 'NO')"
          echo "File size: $(wc -c < coverage.xml) bytes"
          echo "First 5 lines of coverage.xml:"
          head -5 coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && runner.os == 'Linux' && always()
        uses: codecov/codecov-action@1f60566a86da84c4b4b64c17662a90de97fbb8d7  # v5.4.2
        with:
          files: coverage.xml
          disable_search: true
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false
          verbose: true
          slug: mick-gsk/drift
          use_oidc: true

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12' && runner.os == 'Linux' && always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

      - name: Self-analysis
        if: matrix.python-version == '3.12'
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m drift analyze --repo . --format json --fail-on none | Out-Null

      - name: Drift self-check (score gate)
        if: matrix.python-version == '3.12'
        shell: pwsh
        run: |
          & $env:PYTHON_BIN -m drift self --format json | Set-Content drift_score.json
          & $env:PYTHON_BIN -c @'
          import json, sys
          data = json.load(open('drift_score.json'))
          score = data['drift_score']
          if score > 0.55:
              print(f'FAIL: drift self score {score:.3f} exceeds threshold 0.55')
              sys.exit(1)
          print(f'OK: drift self score {score:.3f} (threshold 0.55)')
          '@

      - name: Upload drift score artifact
        if: matrix.python-version == '3.12' && runner.os == 'Windows' && always() && hashFiles('drift_score.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: drift-score-py312-windows
          path: drift_score.json
          if-no-files-found: error

      - name: Risk audit compliance (POLICY §18)
        if: matrix.python-version == '3.12'
        shell: pwsh
        run: |
          $diffBase = "HEAD~1"
          if ($env:GITHUB_BASE_REF) {
            $diffBase = "origin/$($env:GITHUB_BASE_REF)"
          }
          & $env:PYTHON_BIN scripts/check_risk_audit.py --diff-base $diffBase

      - name: Validate negative-pattern library
        if: matrix.python-version == '3.12'
        shell: pwsh
        run: |
          & $env:PYTHON_BIN scripts/validate_negative_patterns.py
          & $env:PYTHON_BIN scripts/check_negative_patterns.py --check

      # --- Performance regression loop (conditional on PR label) ---
      - name: Performance benchmark (perf-loop PR)
        if: >-
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'perf-regression-loop')
        shell: pwsh
        run: |
          $raw = & $env:PYTHON_BIN scripts/perf_gate.py `
            --budget 30 `
            --target-path src/drift `
            --runs 3 `
            --json 2>&1
          [IO.File]::WriteAllText("$PWD\perf_result.json", ($raw -join "`n"), [Text.Encoding]::UTF8)

          & $env:PYTHON_BIN -c @'
          import json, sys
          with open("perf_result.json", encoding="utf-8") as f:
              r = json.load(f)
          wc = r["wall_clock_seconds"]
          budget = r["budget_seconds"]
          if r["passed"]:
              print(f"PASS: {wc:.1f}s < {budget:.0f}s budget")
          else:
              print(f"FAIL: {wc:.1f}s > {budget:.0f}s budget (+{r['overshoot_seconds']:.1f}s)")
              sys.exit(1)
          '@

      - name: Post benchmark result to PR
        if: >-
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'perf-regression-loop') &&
          always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (-not (Test-Path perf_result.json)) {
            Write-Host "No perf_result.json — benchmark step likely skipped"
            exit 0
          }

          $r = Get-Content perf_result.json -Raw | ConvertFrom-Json
          $wc = $r.wall_clock_seconds
          $budget = $r.budget_seconds
          $iter = $r.iteration
          $maxIter = $r.max_iterations
          $findings = $r.findings_count
          $prNum = "${{ github.event.pull_request.number }}"

          if ($r.passed) {
            $comment = "### Performance Gate: PASS`n`n"
            $comment += "| Metric | Value |`n|--------|-------|`n"
            $comment += "| Wall-clock (median) | $($wc)s |`n"
            $comment += "| Budget | $($budget)s |`n"
            $comment += "| Findings | $findings |`n`n"
            $comment += "Budget met. This PR can be merged."
          } else {
            $overshoot = $r.overshoot_seconds
            $comment = "### Performance Gate: FAIL`n`n"
            $comment += "| Metric | Value |`n|--------|-------|`n"
            $comment += "| Wall-clock (median) | $($wc)s |`n"
            $comment += "| Budget | $($budget)s |`n"
            $comment += "| Overshoot | +$($overshoot)s |`n"
            $comment += "| Iteration | $iter / $maxIter |`n"
            $comment += "| Findings | $findings |`n`n"
            $comment += "Budget exceeded by $($overshoot)s."

            if ($iter -lt $maxIter) {
              $comment += "`n`n@copilot Iteration $($iter + 1)/$maxIter still $($overshoot)s over budget. Focus on top hotspots from the benchmark artifact."
            } else {
              $comment += "`n`nMax iterations ($maxIter) reached. Manual optimization required."
              gh pr edit $prNum --add-label "needs-manual-review"
            }
          }

          [IO.File]::WriteAllText("$PWD\pr_comment.md", $comment, [Text.Encoding]::UTF8)
          gh pr comment $prNum --body-file pr_comment.md

  smoke-pr:
    name: Smoke PR (fast profile)
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 15
    needs: version-check
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install `
            -e packages/drift-config `
            -e packages/drift-engine `
            -e packages/drift-sdk `
            -e packages/drift-output `
            -e packages/drift-session `
            -e packages/drift-mcp `
            -e packages/drift-verify `
            -e packages/drift-cli
          python -m pip install -e ".[dev]"

      - name: Run fast smoke profile
        shell: powershell
        run: |
          python -m pytest tests/test_smoke_real_repos.py -v --run-slow --smoke-profile=pr

  smoke-nightly:
    name: Smoke Nightly (full profile)
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_nightly_smoke == true)
    runs-on: windows-latest
    timeout-minutes: 30
    needs: version-check
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run full nightly smoke profile
        shell: powershell
        run: |
          python -m pytest tests/test_smoke_real_repos.py -v --run-slow --smoke-profile=nightly

  update-readme-badges:
    name: Update README badges
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && always()
    needs:
      - version-check
      - pre-commit
      - test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage-py3.12
          path: badge-artifacts/coverage

      - uses: actions/download-artifact@v4
        with:
          name: drift-score-py312-windows
          path: badge-artifacts/drift-score
        continue-on-error: true

      - name: Update README badge sources
        shell: pwsh
        run: |
          $culture = [System.Globalization.CultureInfo]::InvariantCulture

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

          [xml]$coverageXml = Get-Content "badge-artifacts/coverage/coverage.xml" -Raw -Encoding UTF8
          $lineRate = [double]::Parse($coverageXml.coverage.'line-rate', $culture)
          $coveragePct = [math]::Round($lineRate * 100, 2)
          $coverageValue = $coveragePct.ToString("0.##", $culture)
          $coverageColor = if ($coveragePct -ge 90) {
            "brightgreen"
          } elseif ($coveragePct -ge 80) {
            "green"
          } elseif ($coveragePct -ge 70) {
            "yellowgreen"
          } elseif ($coveragePct -ge 60) {
            "yellow"
          } else {
            "red"
          }

          $scorePath = "badge-artifacts/drift-score/drift_score.json"
          $hasScoreArtifact = Test-Path $scorePath
          if ($hasScoreArtifact) {
            $scoreData = Get-Content $scorePath -Raw -Encoding UTF8 | ConvertFrom-Json
            $score = [math]::Round([double]$scoreData.drift_score, 2).ToString("0.##", $culture)
            $scoreColor = switch ($scoreData.severity) {
              "low"    { "brightgreen" }
              "medium" { "yellow" }
              "high"   { "red" }
              default   { "lightgrey" }
            }
          }

          $coverageEndpointUrl = "https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/mick-gsk/drift/main/.github/badges/coverage.json"

          $coverageBadge = @{
            schemaVersion = 1
            label = "coverage"
            message = "${coverageValue}%"
            color = $coverageColor
          }
          $coverageBadgePath = ".github/badges/coverage.json"
          New-Item -ItemType Directory -Path ".github/badges" -Force | Out-Null
          $coverageBadgeJson = ($coverageBadge | ConvertTo-Json -Depth 3)
          [IO.File]::WriteAllText("$PWD\$coverageBadgePath", ($coverageBadgeJson + "`n"), [Text.Encoding]::UTF8)

          if ($hasScoreArtifact) {
            $scoreBadgeUrl = "https://img.shields.io/badge/drift%20score-${score}-${scoreColor}?style=flat"
          }

          $readmePath = "README.md"
          $content = Get-Content $readmePath -Raw -Encoding UTF8
          $updated = $content
          $updated = $updated -replace 'https://img\.shields\.io/(badge/coverage-[^\s\)]+\?style=flat|endpoint\?url=[^\s\)]+coverage\.json)', $coverageEndpointUrl
          if ($hasScoreArtifact) {
            $updated = $updated -replace 'https://img\.shields\.io/badge/drift%20score-[^\s\)]+\?style=flat', $scoreBadgeUrl
          }

          [IO.File]::WriteAllText("$PWD\$readmePath", $updated, [Text.Encoding]::UTF8)
          git add README.md .github/badges/coverage.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            if ($hasScoreArtifact) {
              Write-Host "README/coverage badge sources already up to date (coverage=$coverageValue%, score=$score)"
            } else {
              Write-Host "README/coverage badge sources already up to date (coverage=$coverageValue%, score unchanged: no artifact)"
            }
            exit 0
          }

          git commit -m "chore: update README badges [skip ci]"
          git push
          if ($hasScoreArtifact) {
            Write-Host "README badges updated (coverage=$coverageValue%, score=$score)"
          } else {
            Write-Host "README coverage badge updated (coverage=$coverageValue%, score unchanged: no artifact)"
          }

  required-checks-passed:
    name: Required checks passed
    if: always()
    needs:
      - update-readme-badges
      - version-check
      - test
      - pre-commit
      - smoke-pr
      - smoke-nightly
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs passed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq -e '
            to_entries | map(.value.result) | all(. == "success" or . == "skipped")
          '
