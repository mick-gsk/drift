name: Issue Auto Agent Assign (Bug)

on:
  issues:
    types: [opened, reopened, labeled, unlabeled]

permissions:
  issues: write

concurrency:
  group: "issue-auto-agent-${{ github.event.issue.number }}"
  cancel-in-progress: true

jobs:
  assign-copilot:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Assign bug issues to Copilot (except good first issue)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue || issue.state !== "open") {
              core.info("Issue missing or not open; skipping.");
              return;
            }

            const labels = (issue.labels || []).map((label) =>
              typeof label === "string" ? label : label.name,
            );
            const hasBug = labels.includes("bug");
            const hasGoodFirstIssue = labels.includes("good first issue");

            if (!hasBug || hasGoodFirstIssue) {
              core.info("Issue is outside bug-only subset or is marked good first issue.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            const assignees = (issue.assignees || [])
              .map((assignee) => (assignee.login || "").toLowerCase())
              .filter(Boolean);
            const hasCopilotAssignee = assignees.includes("copilot");

            if (!hasCopilotAssignee) {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number,
                  assignees: ["copilot"],
                });
                core.info("Assigned issue to @copilot.");
              } catch (error) {
                core.warning(`Could not assign @copilot automatically: ${error.message}`);
              }
            }

            if (!labels.includes("agent-task")) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ["agent-task"],
              });
              core.info("Added agent-task label.");
            }

            const marker = "<!-- drift-auto-agent-assignment -->";
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const alreadyCommented = comments.some((comment) =>
              (comment.body || "").includes(marker),
            );

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: [
                  marker,
                  "Automatisch fuer Agent-Bearbeitung markiert (Bug-Teilmenge ohne good first issue).",
                  "",
                  "- Assignee: @copilot (falls verfuegbar)",
                  "- Label: agent-task",
                ].join("\n"),
              });
            }
