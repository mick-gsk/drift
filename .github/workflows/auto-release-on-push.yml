name: Auto Create Release On Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release-on-push
  cancel-in-progress: false

jobs:
  create-release-if-needed:
    name: Create tag + release when version is untagged
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate pyproject.toml SemVer format
        run: python scripts/check_version.py --check-semver

      - name: Resolve release tag from pyproject.toml
        id: version
        shell: powershell
        run: |
          $version = python -c "import tomllib, pathlib; data=tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])"
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Resolved release tag: v$version"

      - name: Check whether tag and release already exist
        id: check
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git ls-remote --exit-code --tags origin "refs/tags/$env:TAG" > $null 2>&1
          if ($LASTEXITCODE -eq 0) {
            "tag_exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "tag_exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

          cmd /c "gh release view \"$env:TAG\" >nul 2>nul"
          if ($LASTEXITCODE -eq 0) {
            "release_exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "release_exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create and push missing version tag
        if: steps.check.outputs.tag_exists != 'true'
        shell: powershell
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$env:TAG" "$env:GITHUB_SHA"
          git push origin "$env:TAG"
          Write-Host "Created missing tag $env:TAG"

      - name: Create missing GitHub release
        if: steps.check.outputs.release_exists != 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          cmd /c "gh release view \"$env:TAG\" >nul 2>nul"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release for $env:TAG already exists - skipping"
            exit 0
          }

          gh release create "$env:TAG" `
            --title "$env:TAG" `
            --generate-notes
          Write-Host "Created missing release for $env:TAG"

      - name: Skip summary
        if: steps.check.outputs.tag_exists == 'true' && steps.check.outputs.release_exists == 'true'
        shell: powershell
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: Write-Host "Tag and release already exist for $env:TAG - nothing to do"