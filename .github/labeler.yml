signals:
  - changed-files:
      - any-glob-to-any-file: "src/drift/signals/**"

scoring:
  - changed-files:
      - any-glob-to-any-file: "src/drift/scoring/**"

ingestion:
  - changed-files:
      - any-glob-to-any-file: "src/drift/ingestion/**"

output:
  - changed-files:
      - any-glob-to-any-file: "src/drift/output/**"

cli:
  - changed-files:
      - any-glob-to-any-file: "src/drift/commands/**"

tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "docs-site/**"
          - "docs/**"
          - "README.md"
          - "CONTRIBUTING.md"
          - "DEVELOPER.md"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/actions/**"
          - "Makefile"

config:
  - changed-files:
      - any-glob-to-any-file:
          - "src/drift/config.py"
          - "drift.example.yaml"

security:
  - changed-files:
      - any-glob-to-any-file:
          - "SECURITY.md"
          - ".github/workflows/security-hygiene.yml"
          - ".github/workflows/codeql.yml"
          - ".pre-commit-config.yaml"

# ---------------------------------------------------------------------------
# PR Lane Labels
# Collision rule: high-risk > standard > fast-lane
# (actions/labeler applies all matching labels; fast-lane is overridden
#  by the automerge workflow which checks absence of high-risk/standard)
# ---------------------------------------------------------------------------

lane/fast-lane:
  - changed-files:
      - all-globs-to-all-files:
          - "docs/**"
          - "docs-site/**"
          - "README.md"
          - "CONTRIBUTING.md"
          - "DEVELOPER.md"
          - ".github/prompts/**"
          - ".github/instructions/**"
          - "tests/fixtures/**"
          - "benchmark_results/**"
          - "benchmarks/corpus/**"
          - "benchmarks/defect_corpus/**"

lane/high-risk:
  - changed-files:
      - any-glob-to-any-file:
          - "src/drift/signals/**"
          - "src/drift/scoring/**"
          - "src/drift/ingestion/**"
          - "POLICY.md"
          - ".github/copilot-instructions.md"
          - "docs/decisions/**"
          - "audit_results/**"
          - "audit/**"

lane/standard:
  - changed-files:
      - any-glob-to-any-file: "src/drift/**"
