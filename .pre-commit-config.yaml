# Repository-wide hygiene and security checks.
# Run with: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "^(\\.specify/|specs/|\\.github/agents/speckit\\.)"
      - id: end-of-file-fixer
        exclude: "^(\\.specify/|specs/|\\.github/agents/speckit\\.|\\.vscode/drift-session\\.json$|playground/.*\\.tsbuildinfo$|packages/cockpit-ui/\\.next/|packages/cockpit-ui/playwright-report/|packages/cockpit-ui/test-results/|td_parsed\\.json$|result_line\\.txt$|_bisect_tests\\.txt$|last_nudge\\.json$|last_scan\\.json$|output\\.json$|(^|[\\/])nudge_baselines[\\/])"
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
        exclude: "^conda\\.recipe/"
      - id: check-added-large-files
        args: [--maxkb=1024]
        exclude: "^(benchmark_results/(kpi_snapshot\\.json|mutation_benchmark\\.json|drift_self\\.json|kpi_trend\\.jsonl))$"
      - id: check-merge-conflict
      - id: detect-private-key
        # Multiline-secret tests intentionally include key-like fixtures.
        exclude: "(^|/)(\\.secrets\\.baseline|\\.detect-secrets\\.cfg|tests/test_hardcoded_secret\\.py)$"

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: "(^|/)(tests/test_hardcoded_secret\\.py|tests/test_insecure_default\\.py|tests/golden/corpus_snapshot\\.json|tests/golden/corpus_snapshot\\.sarif|tests/fixtures/ground_truth\\.py|src/drift/negative_context\\.py|benchmarks/oracle_repos\\.json|\\.github/instructions/drift-release-automation\\.instructions\\.md|\\.drift-baseline\\.json|\\.specify/integrations/(speckit|copilot)\\.manifest\\.json)$"
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - "(^|[\\\\/])uv\\.lock$"
          - --exclude-files
          - "(^|[\\\\/])benchmarks[\\\\/]corpus[\\\\/]\\.drift-cache-golden[\\\\/]parse([\\\\/]|$)"
          - --exclude-files
          - "(^|[\\\\/])(benchmark_results|audit_results|site|docs-site|\\.hypothesis|\\.venv|dist|build|\\.mypy_cache|\\.pytest_cache|\\.ruff_cache|\\.drift-cache|work_artifacts|master-backlog|tagesplanung)([\\\\/]|$)"
          - --exclude-files
          - "(^|[\\\\/])packages[\\\\/]cockpit-ui[\\\\/]\\.next([\\\\/]|$)"
          - --exclude-files
          - "(^|[\\\\/])(last_nudge|last_scan|output)\\.json$|(^|[\\\\/])nudge_baselines[\\\\/]"
          - --exclude-files
          - "(^|[\\\\/])td_parsed\\.json$"

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff
        files: "^(packages/|tests/)"
        stages: [pre-commit]
      - id: ruff-format
        files: "^(packages/|tests/)"
        stages: [pre-commit]
        args: [--check]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=error]
        exclude: "^(\\.githooks/|examples/vibe-coding/pre-push$|\\.shellcheckrc$|demos/\\.tools/)"

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor
        args: [--persona=regular, --min-severity=medium, --min-confidence=medium]
        files: "^(\\.github/workflows/security-hygiene\\.yml|action\\.yml)$"

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        stages: [pre-commit]
        files: "^(docs-site/.*\\.md|README\\.md|CONTRIBUTING\\.md|DEVELOPER\\.md|SECURITY\\.md|SUPPORT\\.md|CHANGELOG\\.md)$"
        args: [--config, .markdownlint-cli2.jsonc]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]

  - repo: local
    hooks:
      - id: drift-nudge-gate
        name: drift nudge gate
        description: >-
          Block commits when the last drift_nudge recommended REVERT and the
          flagged files are still unchanged. Set DRIFT_SKIP_NUDGE_GATE=1 to
          bypass, or nudge_gate.on_missing: warn|block in drift.yaml.
        entry: python scripts/nudge_gate.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: agent-harness-contract
        name: agent harness contract
        description: >-
          Ensure the agent-harness map, audit artifacts, Markdown links, root
          allowlist entries, and MCP registration/router boundaries stay valid.
        entry: python scripts/check_agent_harness_contract.py --root .
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: mypy
        name: mypy type check (packages)
        description: >-
          Run mypy on all workspace packages - same target as CI. Catches type
          errors before they reach GitHub Actions. Set SKIP=mypy to bypass temporarily.
        entry: python -m mypy packages/drift/src/drift packages/drift-engine/src/drift_engine packages/drift-sdk/src/drift_sdk packages/drift-output/src/drift_output packages/drift-cli/src/drift_cli packages/drift-mcp/src/drift_mcp packages/drift-session/src/drift_session packages/drift-config/src/drift_config
        language: system
        pass_filenames: false
        files: "^packages/"
        stages: [pre-commit]
