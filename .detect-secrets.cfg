# detect-secrets exclusion patterns (regex)
#
# Note: detect-secrets does not read this file automatically.
# Keep these rules aligned with .pre-commit-config.yaml and CI scan args.

[exclude-files]
pattern = (^|[\\/])uv\.lock$
pattern = (^|[\\/])(benchmark_results|audit_results|site|docs-site|\.hypothesis|\.venv|dist|build|\.mypy_cache|\.pytest_cache|\.ruff_cache|\.drift-cache|work_artifacts|master-backlog|tagesplanung)([\\/]|$)

[exclude-lines]
# Documentation placeholder, not a real credential.
pattern = TWINE_PASSWORD=<your-token>
# Environment variable labels in docs and examples.
pattern = PYPI_API_TOKEN
