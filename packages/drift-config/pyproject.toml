[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "drift-config"
version = "2.49.0"
description = "Configuration loading and schema for drift-analyzer"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/drift_config"]
