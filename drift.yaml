exclude:
  - ".venv/**"
  - ".venv-1/**"
  - "benchmarks/**"
  - "benchmark_results/**"
  - "data/**"
  - "community_flywheel_output/**"
  - "work_artifacts/**"
  - "tagesplanung/**"
  - "site/**"
  - "overrides/**"
  - "extensions/**/node_modules/**"
  - "examples/**"
  - "scripts/**"
  - "docs-site/**"
  - "tests/fixtures/**"
  - "hooks/**"
  - "demos/**"
  - ".drift/**"

# Per-path overrides: suppress pattern_fragmentation in modules where
# error-handling and return-pattern diversity is architecturally intentional
# (i.e. domain-specific contracts, not accidental fragmentation).
path_overrides:
  # Each signal type has its own error-handling contract (IOError, ValueError,
  # Exception, specific AST errors). Variation is intentional by design.
  "src/drift/signals":
    exclude_signals:
      - pattern_fragmentation
  # Subprocess, entry-point loading, and JSON parsing have fundamentally
  # different error models and cannot share a single canonical pattern.
  "src/drift/integrations":
    exclude_signals:
      - pattern_fragmentation
  # Loop-based calibration functions use `continue` for resilience; this
  # deviates from the module's dominant return-based pattern by design.
  "src/drift/calibration":
    exclude_signals:
      - pattern_fragmentation
  # API layer: query functions return Optional, command functions return data
  # directly. Mixed return-type contract is intentional (CQRS-lite pattern).
  "src/drift/api":
    exclude_signals:
      - pattern_fragmentation

calibration:
  enabled: true
  auto_recalibrate: true
  min_samples: 20
  correlation_window_days: 30
  weak_fp_window_days: 60
  decay_days: 90
  feedback_path: .drift/feedback.jsonl
  history_dir: .drift/history
  max_snapshots: 50
  bug_labels:
    - bug
    - regression
