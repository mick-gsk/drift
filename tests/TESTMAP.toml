# TESTMAP.toml — source file → relevant test files
#
# Usage:
#   python scripts/_test_map_lookup.py src/drift/session.py
#   make test-for FILE=src/drift/session.py
#
# Keys are workspace-relative source paths.
# Values are lists of glob patterns relative to the repo root.
# Maintain this file when adding or renaming source/test modules.

