# GitHub App registration manifest.
# Use this at: https://github.com/settings/apps/new?manifest=...
# or paste the values manually into the App creation form.
#
# Docs: https://docs.github.com/en/apps/creating-github-apps

name: Drift Bot
description: >
  Automatic architectural drift analysis on pull requests.
  Catches structural erosion from AI-generated code that passes all your tests.
url: https://mick-gsk.github.io/drift/
public: true

# Webhook configuration
default_events:
  - pull_request

# Permissions (minimum required)
default_permissions:
  contents: read        # Clone and read repository code
  pull_requests: write  # Post PR comments
  metadata: read        # Required for all GitHub Apps

# Webhook event filter (only these events trigger the bot)
# pull_request: opened, synchronize, reopened
